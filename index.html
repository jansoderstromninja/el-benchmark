<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El-benchmark: Pris, Vind, Sol & Konsumtion</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .chart-container { position: relative; height: 80vh; width: 100%; }
    </style>
</head>
<body>

    <h2>Elpris, Vind, Sol & Konsumtionsprognos</h2>
    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ==========================================
        // KLISTRA IN DIN EGEN CONFIG HÄR!
        // ==========================================
        const firebaseConfig = {
 apiKey: "AIzaSyBmk39kYb5XR448B2keXRwLIfJIFyXmAoA",
  authDomain: "el-benchmark.firebaseapp.com",
  projectId: "el-benchmark",
  storageBucket: "el-benchmark.firebasestorage.app",
  messagingSenderId: "775311101952",
  appId: "1:775311101952:web:904f9fad422692df6e88e5"
        };
        // ==========================================

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const nowLinePlugin = {
            id: 'nowLinePlugin',
            afterDraw: (chart) => {
                const index = chart.config.options.plugins?.nowLinePlugin?.index;
                if (index === undefined) return;

                const x = chart.scales.x.getPixelForValue(index);
                const yTop = chart.scales.y.top;
                const yBottom = chart.scales.y.bottom;

                const ctx = chart.ctx;
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(x, yTop);
                ctx.lineTo(x, yBottom);
                ctx.lineWidth = 2;
                ctx.strokeStyle = '#2ecc71';
                ctx.setLineDash([5, 5]);
                ctx.stroke();

                ctx.fillStyle = '#2ecc71';
                ctx.textAlign = 'center';
                ctx.font = 'bold 12px sans-serif';
                ctx.fillText('Nu', x, yTop - 5);
                ctx.restore();
            }
        };

        async function renderChart() {
            const labels = [];
            const priceData = [];
            const consumptionData = [];
            const windData = [];
            const solarData = [];

            let nowIndex = 0; 
            const currentTime = new Date().getTime();

            const q = query(collection(db, "electricity_points"), orderBy("timestamp", "asc"));
            const querySnapshot = await getDocs(q);

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                
                if (data.timestamp) {
                    const dateObj = data.timestamp.toDate();
                    const formattedDate = dateObj.toLocaleString('sv-FI', { 
                        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' 
                    });
                    labels.push(formattedDate);

                    if (dateObj.getTime() <= currentTime) {
                        nowIndex = labels.length - 1;
                    }
                } else {
                    labels.push(doc.id);
                }

                priceData.push(typeof data.actual_price === 'number' ? data.actual_price : null);
                consumptionData.push(typeof data.predicted_consumption_mw === 'number' ? data.predicted_consumption_mw : null);
                windData.push(typeof data.predicted_wind_mw === 'number' ? data.predicted_wind_mw : null);
                solarData.push(typeof data.predicted_solar_mw === 'number' ? data.predicted_solar_mw : null);
            });

            const ctx = document.getElementById('myChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                plugins: [nowLinePlugin],
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Elpris (c/kWh)',
                            data: priceData,
                            borderColor: 'rgba(54, 162, 235, 1)', 
                            yAxisID: 'y',
                            tension: 0.4,
                            fill: false,        
                            spanGaps: false,
                            order: 1
                        },
                        {
                            label: 'Konsumtionsprognos (MW)',
                            data: consumptionData,
                            borderColor: 'rgba(255, 99, 132, 1)', 
                            borderDash: [5, 5],
                            yAxisID: 'y1', 
                            tension: 0.4,
                            spanGaps: false,
                            order: 2
                        },
                        {
                            label: 'Vindprognos (MW)',
                            data: windData,
                            borderColor: 'rgba(75, 192, 192, 1)', 
                            yAxisID: 'y1',
                            tension: 0.4,
                            spanGaps: false,
                            order: 3
                        },
                        {
                            label: 'Solprognos (MW)',
                            data: solarData,
                            borderColor: 'rgba(241, 196, 15, 1)', // Gul/Orange ton för sol
                            yAxisID: 'y1',
                            tension: 0.4,
                            spanGaps: false,
                            order: 4
                        }
                    ]
                },
                options: {
                    plugins: {
                        nowLinePlugin: {
                            index: nowIndex
                        },
                        legend: {
                            position: 'top',
                            labels: {
                                usePointStyle: true,
                            }
                        }
                    },
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    scales: {
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: {
                                display: true,
                                text: 'Pris (c/kWh)'
                            }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: {
                                display: true,
                                text: 'MW (Effekt)'
                            },
                            grid: {
                                drawOnChartArea: false 
                            }
                        }
                    }
                }
            });
        }

        renderChart();
    </script>
</body>
</html>
