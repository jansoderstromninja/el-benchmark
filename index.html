<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El-benchmark</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        .chart-container { position: relative; height: 80vh; width: 100%; }
    </style>
</head>
<body>

    <h2>Elpris, Vind & Konsumtion</h2>
    <div class="chart-container">
        <canvas id="myChart"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // ==========================================
        // VIKTIGT: KLISTRA IN DIN EGEN CONFIG HÄR!
        // ==========================================
        const firebaseConfig = {
    apiKey: "AIzaSyBmk39kYb5XR448B2keXRwLIfJIFyXmAoA",
    authDomain: "el-benchmark.firebaseapp.com",
  projectId: "el-benchmark",
  storageBucket: "el-benchmark.firebasestorage.app",
  messagingSenderId: "775311101952",
  appId: "1:775311101952:web:904f9fad422692df6e88e5"
        };
        // ==========================================

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function renderChart() {
            const labels = [];
            const priceData = [];
            const windData = [];
            const consumptionData = [];

            const q = query(collection(db, "electricity_points"), orderBy("timestamp", "asc"));
            const querySnapshot = await getDocs(q);

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                
                // Formaterar X-axeln snyggare, t.ex. "21 jul 15:00"
                if (data.timestamp) {
                    const dateObj = data.timestamp.toDate();
                    const formattedDate = dateObj.toLocaleString('sv-FI', { 
                        month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' 
                    });
                    labels.push(formattedDate);
                } else {
                    labels.push(doc.id);
                }

                priceData.push(data.actual_price !== undefined ? data.actual_price : null);
                windData.push(data.predicted_wind_mw !== undefined ? data.predicted_wind_mw : null);
                consumptionData.push(data.predicted_consumption_mw !== undefined ? data.predicted_consumption_mw : null);
            });

            const ctx = document.getElementById('myChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [
                        {
                            label: 'Elpris (c/kWh)',
                            data: priceData,
                            borderColor: 'rgba(54, 162, 235, 1)', 
                            backgroundColor: 'rgba(54, 162, 235, 0.1)',
                            yAxisID: 'y',
                            tension: 0.4,
                            fill: true
                        },
                        {
                            label: 'Vindprognos (MW)',
                            data: windData,
                            borderColor: 'rgba(75, 192, 192, 1)', 
                            borderDash: [5, 5],
                            yAxisID: 'y1',
                            tension: 0.4
                        },
                        {
                            label: 'Konsumtionsprognos (MW)',
                            data: consumptionData,
                            borderColor: 'rgba(255, 99, 132, 1)', 
                            borderDash: [5, 5],
                            yAxisID: 'y1', 
                            tension: 0.4
                        }
                    ]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    scales: {
                        y: {
                            type: 'linear',
                            display: true,
                            position: 'left',
                            title: {
                                display: true,
                                text: 'Pris (c/kWh)'
                            }
                        },
                        y1: {
                            type: 'linear',
                            display: true,
                            position: 'right',
                            title: {
                                display: true,
                                text: 'Vind / Konsumtion (MW)'
                            },
                            grid: {
                                drawOnChartArea: false 
                            }
                        }
                    }
                }
            });
        }

        renderChart();
    </script>
</body>
</html>
