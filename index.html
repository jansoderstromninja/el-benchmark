<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>El-benchmark</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; padding: 10px; margin: 0; background-color: #f9f9f9; }
        .container { background-color: white; padding: 15px; border-radius: 12px; height: 400px; }
    </style>
</head>
<body>
    <div class="container">
        <canvas id="elChart"></canvas>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.3/firebase-firestore.js";

        // ... (din firebaseConfig här) ...

        async function renderChart() {
            // ... (din data-hämtning här) ...

            new Chart(document.getElementById('elChart').getContext('2d'), {
                type: 'line',
                data: { /* ... data ... */ },
                options: {
                    responsive: true,
                    maintainAspectRatio: false, // Gör grafen följsam
                    interaction: {
                        mode: 'nearest', // Bättre för touch
                        intersect: false,
                    },
                    scales: {
                        x: {
                            ticks: {
                                maxRotation: 45,
                                minRotation: 45,
                                autoSkip: true,
                                maxTicksLimit: 6 // Begränsar antalet datumetiketter
                            }
                        }
                    }
                }
            });
        }
        renderChart();
    </script>
</body>
</html>
